<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Princess Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        rel="stylesheet">

</head>

<body>

    <!-- Background -->

    <div class="stars"></div>

    <div class="aurora"></div>

    <div class="planet"></div>

    <!-- Card -->

    <main class="glass">

        <div class="header">

            <img src="../assets/princess.jpg" class="profile">

            <h1>
                Good Morning
            </h1>

            <h2>
                Princess Sandrina 💜
            </h2>

            <p id="typing"></p>

        </div>

        <!-- MENU -->

        <section class="menu">

            <div class="card" id="letter">

                <i class="fa-solid fa-envelope-open-text"></i>

                <span>Morning Letter</span>

            </div>

            <div class="card" id="gallery">

                <i class="fa-solid fa-images"></i>

                <span>Gallery</span>

            </div>

            <div class="card" id="music">

                <i class="fa-solid fa-music"></i>

                <span>Music</span>

            </div>

            <div class="card" id="quote">

                <i class="fa-solid fa-heart"></i>

                <span>Quotes</span>

            </div>

            <div class="card" id="countdown">

                <i class="fa-solid fa-clock"></i>

                <span>Countdown</span>

            </div>

            <div class="card surprise" id="surprise">

                <i class="fa-solid fa-gift"></i>

                <span>Special Surprise</span>

            </div>

        </section>

        <footer>

            Made with ❤️ by Rizky

        </footer>

    </main>

    <!-- Popup -->

    <div id="popup">

        <div class="popup-card">

            <h2>

                🌸 Selamat Pagi Princess 🌸

            </h2>

            <p>

                Semoga hari ini menjadi hari yang indah.

            </p>

            <p>

                Jangan lupa sarapan.

            </p>

            <p>

                Tetap semangat sekolah ya.

            </p>

            <p>

                Semoga semua impianmu
                satu demi satu menjadi kenyataan.

            </p>

            <button id="closePopup">

                Tutup

            </button>

        </div>

    </div>

    <script src="dashboard.js"></script>

</body>

</html>
